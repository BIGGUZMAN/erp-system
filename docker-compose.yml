services:

  mysql:
    image: mysql:8.0
    container_name: erp_mysql
    restart: always
    mem_limit: 1024m

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: erp_db

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  laravel:
    build: ./backend
    container_name: erp_laravel
    restart: always
    mem_limit: 768m

    working_dir: /var/www

    volumes:
      - ./backend:/var/www

    ports:
      - "8000:8000"

    depends_on:
      - mysql

  angular:
    build:
      context: ./frontend/client

    container_name: erp_angular
    restart: always
    mem_limit: 1536m

    working_dir: /app

    environment:
      - NODE_OPTIONS=--max-old-space-size=1024

    ports:
      - "4200:4200"

    volumes:
      - ./frontend/client:/app
      - /app/node_modules

    command: npx ng serve --host 0.0.0.0 --port 4200


    depends_on:
      - laravel

volumes:
  mysql_data: