version: "3.9"

services:

  mysql:
    image: mysql:8
    container_name: erp_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: erp_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  laravel:
    build: ./backend
    container_name: erp_laravel
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    ports:
      - "8000:8000"
    depends_on:
      - mysql

  angular:
    build:
      context: ./frontend/client
    container_name: erp_angular
    ports:
      - "4200:4200"
    volumes:
      - ./frontend/client:/app
      - /app/node_modules
    depends_on:
      - laravel

volumes:
  mysql_data: