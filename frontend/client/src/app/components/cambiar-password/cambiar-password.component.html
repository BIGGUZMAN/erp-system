<main class="login-page">
    <div class="login-card-wrapper">
        <div class="login-card">
            <button class="btn-back" (click)="cancelar()">
                <span class="material-symbols-outlined">arrow_back</span>
                <span>Volver</span>
            </button>

            <div class="institutional-header">
                <div class="logo-box">
                    <img src="logo1.jpg" alt="Logo ITGAM" class="logo-img">
                </div>
                <h1 class="logo-title">Recuperar Acceso</h1>
                <div class="decorator-line"></div>
            </div>

            <!-- MODO SOLICITAR -->
            <div *ngIf="modo === 'solicitar'">
                <div class="title-section" style="margin-bottom: 1.5rem; text-align: center;">
                    <h2 class="form-title" style="color: #003366; font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem;">Recuperar Contraseña</h2>
                    <p class="form-subtitle" style="color: #6b7280; font-size: 0.85rem;">Ingresa tu correo electrónico institucional para recibir un enlace de recuperación.</p>
                </div>

                <form (ngSubmit)="onSolicitarEnlace()" #solicitarForm="ngForm" class="login-form">
                    <div class="input-field">
                        <label class="input-label">Correo Institucional</label>
                        <div class="input-wrapper">
                            <span class="material-symbols-outlined input-icon">mail</span>
                            <input type="email" name="correo" [(ngModel)]="correo" class="form-control"
                                placeholder="usuario@gamadero.tecnm.mx" required>
                        </div>
                    </div>

                    <div class="action-section" style="margin-top: 1rem;">
                        <button type="submit" class="btn-primary" [disabled]="isLoading">
                            <span>Enviar Enlace</span>
                            <span class="material-symbols-outlined">send</span>
                        </button>
                    </div>
                </form>
            </div>

            <!-- MODO RESTABLECER -->
            <div *ngIf="modo === 'restablecer'">
                <div class="title-section" style="margin-bottom: 1.5rem; text-align: center;">
                    <h2 class="form-title" style="color: #003366; font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem;">Establecer Nueva Contraseña</h2>
                    <p class="form-subtitle" style="color: #6b7280; font-size: 0.85rem;">Ingresa tu nueva contraseña para acceder al sistema.</p>
                </div>

                <form (ngSubmit)="onRestablecerPassword()" #restablecerForm="ngForm" class="login-form">
                    <div class="input-field">
                        <label class="input-label">Nueva Contraseña</label>
                        <div class="input-wrapper">
                            <span class="material-symbols-outlined input-icon">lock</span>
                            <input [type]="showPassword ? 'text' : 'password'" name="password_nuevo"
                                [(ngModel)]="password_nuevo" class="form-control" placeholder="Mínimo 6 caracteres"
                                required>
                            <button type="button" (click)="showPassword = !showPassword" class="toggle-password">
                                <span class="material-symbols-outlined">{{ showPassword ? 'visibility_off' : 'visibility' }}</span>
                            </button>
                        </div>
                    </div>

                    <div class="input-field">
                        <label class="input-label">Confirmar Contraseña</label>
                        <div class="input-wrapper">
                            <span class="material-symbols-outlined input-icon">check_circle</span>
                            <input type="password" name="confirm_password" [(ngModel)]="confirm_password"
                                class="form-control" placeholder="Repite la contraseña" required>
                        </div>
                    </div>

                    <div class="action-section" style="margin-top: 1rem;">
                        <button type="submit" class="btn-primary" [disabled]="isLoading">
                            <span>Restablecer Contraseña</span>
                            <span class="material-symbols-outlined">key</span>
                        </button>
                    </div>
                </form>
            </div>

        </div>

        <footer class="institutional-footer">
            <p>ITGAM ERP © 2026</p>
        </footer>
    </div>
</main>
