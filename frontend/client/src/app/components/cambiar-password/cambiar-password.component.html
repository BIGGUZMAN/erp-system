<main class="login-page">
    <div class="login-card-wrapper">
        <div class="login-card">
            <button class="btn-back" (click)="cancelar()">
                <span class="material-symbols-outlined">arrow_back</span>
                <span>Volver</span>
            </button>

            <div class="institutional-header">
                <div class="logo-box">
                    <img src="logo1.jpg" alt="Logo ITGAM" class="logo-img">
                </div>
                <h1 class="logo-title">Recuperar Acceso</h1>
                <div class="decorator-line"></div>
            </div>

            <div class="title-section">
                <h2 class="form-title">Nueva Contraseña</h2>
                <p class="form-subtitle">Valida tu identidad para restablecer tu cuenta</p>
            </div>

            <form (ngSubmit)="onRecuperarPassword()" #recuperarForm="ngForm" class="login-form">

                <div class="input-field">
                    <label class="input-label">Número de Control</label>
                    <div class="input-wrapper">
                        <span class="material-symbols-outlined input-icon">badge</span>
                        <input type="text" name="numero_control" [(ngModel)]="datos.numero_control" class="form-control"
                            placeholder="Ej. 221130028 o C221130028" required>
                    </div>
                </div>

                <div class="input-field">
                    <label class="input-label">Correo Institucional</label>
                    <div class="input-wrapper">
                        <span class="material-symbols-outlined input-icon">mail</span>
                        <input type="email" name="correo" [(ngModel)]="datos.correo" class="form-control"
                            placeholder="usuario@gamadero.tecnm.mx" required>
                    </div>
                </div>

                <div class="input-field">
                    <label class="input-label">Nueva Contraseña</label>
                    <div class="input-wrapper">
                        <span class="material-symbols-outlined input-icon">lock</span>
                        <input [type]="showPassword ? 'text' : 'password'" name="password_nuevo"
                            [(ngModel)]="datos.password_nuevo" class="form-control" placeholder="Mínimo 6 caracteres"
                            required>
                        <button type="button" (click)="showPassword = !showPassword" class="toggle-password">
                            <span class="material-symbols-outlined">{{ showPassword ? 'visibility_off' : 'visibility'
                                }}</span>
                        </button>
                    </div>
                </div>

                <div class="input-field">
                    <label class="input-label">Confirmar Contraseña</label>
                    <div class="input-wrapper">
                        <span class="material-symbols-outlined input-icon">check_circle</span>
                        <input type="password" name="confirm_password" [(ngModel)]="confirm_password"
                            class="form-control" placeholder="Repite la contraseña" required>
                    </div>
                </div>

                <div class="action-section">
                    <button type="submit" class="btn-primary">
                        <span>Restablecer Contraseña</span>
                        <span class="material-symbols-outlined">key</span>
                    </button>
                </div>
            </form>
        </div>

        <footer class="institutional-footer">
            <p>ITGAM ERP © 2026</p>
        </footer>
    </div>
</main>
